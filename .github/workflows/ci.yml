name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  nix-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Run CI in Nix Dev Shell
        run: |
          nix develop --accept-flake-config -c bash -lc '
            set -euo pipefail

            cargo fmt --all -- --check

            dx bundle --release --platform web -p probex-viewer
            rm -rf probex/assets/viewer
            mkdir -p probex/assets/viewer
            cp -a target/dx/probex-viewer/release/web/public/. probex/assets/viewer/

            PROBEX_SKIP_FRONTEND_BUNDLE=1 cargo clippy -p probex -p probex-common -p probex-viewer --all-targets
            PROBEX_SKIP_FRONTEND_BUNDLE=1 cargo check -p probex -p probex-common
            cargo check -p probex-viewer --target wasm32-unknown-unknown
            PROBEX_SKIP_FRONTEND_BUNDLE=1 cargo build --release -p probex
            PROBEX_SKIP_FRONTEND_BUNDLE=1 cargo package -p probex --allow-dirty --no-verify --list | grep "^assets/viewer/index.html$"
          '
